<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写字楼租赁管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #2d8cf0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #2d8cf0;
        }

        button {
            background-color: #2d8cf0;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        button:hover {
            background-color: #1b7acc;
        }

        .house-item {
            border: 1px solid #eee;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 8px;
            background: #fdfdfd;
        }

        .house-item h3 {
            margin-bottom: 8px;
            color: #333;
        }

        .house-item p {
            color: #666;
            margin-bottom: 5px;
        }

        .delete-btn {
            background-color: #f56c6c;
            padding: 6px 14px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background-color: #e45656;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏢 写字楼租赁管理系统</h1>
    </div>

    <div class="form-group">
        <input type="text" id="houseName" placeholder="写字楼名称">
    </div>
    <div class="form-group">
        <input type="text" id="houseArea" placeholder="面积（㎡）">
    </div>
    <div class="form-group">
        <input type="text" id="housePrice" placeholder="租金（元/月）">
    </div>
    <div class="form-group">
        <input type="text" id="houseContact" placeholder="联系方式">
    </div>
    <div class="form-group">
        <textarea id="houseDesc" rows="3" placeholder="详细描述"></textarea>
    </div>

    <button onclick="saveHouse()">保存房源</button>
    <button onclick="clearList()">清空所有</button>

    <div id="houseList" style="margin-top: 30px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const API = "https://jsonbox.io/box_yangtian0_office_2026";

async function renderList() {
    const res = await axios.get(API);
    let list = res.data;
    let html = "";
    list.forEach((item) => {
        html += `
        <div class="house-item">
            <h3>${item.name}</h3>
            <p>面积：${item.area} ㎡</p>
            <p>租金：${item.price} 元/月</p>
            <p>联系人：${item.contact}</p>
            <p>描述：${item.desc}</p>
            <button class="delete-btn" onclick="deleteHouse('${item._id}')">删除</button>
        </div>
        `;
    });
    document.getElementById("houseList").innerHTML = html;
}

async function saveHouse() {
    let name = document.getElementById("houseName").value;
    let area = document.getElementById("houseArea").value;
    let price = document.getElementById("housePrice").value;
    let contact = document.getElementById("houseContact").value;
    let desc = document.getElementById("houseDesc").value;

    if (!name) {
        alert("请填写写字楼名称！");
        return;
    }

    await axios.post(API, { name, area, price, contact, desc });
    alert("保存成功！已同步云端");
    renderList();
    clearInput();
}

async function deleteHouse(id) {
    if (!confirm("确定删除该房源？")) return;
    await axios.delete(`${API}/${id}`);
    renderList();
}

function clearInput() {
    document.getElementById("houseName").value = "";
    document.getElementById("houseArea").value = "";
    document.getElementById("housePrice").value = "";
    document.getElementById("houseContact").value = "";
    document.getElementById("houseDesc").value = "";
}

async function clearList() {
    if (!confirm("确定清空所有房源数据？")) return;
    const list = await (await axios.get(API)).data;
    for(let item of list){
        await axios.delete(`${API}/${item._id}`);
    }
    renderList();
}

window.onload = renderList;
</script>
</body>
</html>
