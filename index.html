<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写字楼租赁管理系统</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; --bg: #f4f6f8; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: var(--bg); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; flex-wrap: wrap; }
        .tab { padding: 12px 25px; cursor: pointer; background: #fff; border: 1px solid transparent; border-bottom: none; margin-right: 5px; border-radius: 8px 8px 0 0; font-weight: 600; color: #7f8c8d; }
        .tab.active { background: var(--accent); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .form-group { margin-bottom: 5px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button.danger { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0; } }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; color: white; }
        .badge-a { background: var(--danger); } .badge-b { background: #f39c12; } .badge-c { background: #95a5a6; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏢 写字楼租赁管理系统</h1>
    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'properties')">🏬 房源管理</div>
        <div class="tab" onclick="openTab(event, 'clients')">👥 客户管理</div>
    </div>

    <!-- 房源 -->
    <div id="properties" class="tab-content active">
        <h2>添加房源</h2>
        <form class="form-grid" onsubmit="addProperty(event)">
            <div class="form-group">
                <label>楼盘名称 *</label>
                <input type="text" id="buildName" required>
            </div>
            <div class="form-group"><label>房号 *</label><input type="text" id="roomNo" required></div>
            <div class="form-group"><label>面积 *</label><input type="number" id="area" required></div>
            <div class="form-group"><label>租金 *</label><input type="text" id="price" required></div>
            <div class="form-group full-width"><button type="submit">➕ 添加房源</button></div>
        </form>
        <h3>房源列表</h3>
        <table><thead><tr><th>楼盘</th><th>房号</th><th>面积</th><th>租金</th><th>操作</th></tr></thead><tbody id="propertyList"></tbody></table>
    </div>

    <!-- 客户 -->
    <div id="clients" class="tab-content">
        <h2>添加客户</h2>
        <form class="form-grid" onsubmit="addClient(event)">
            <div class="form-group"><label>姓名 *</label><input type="text" id="clientName" required></div>
            <div class="form-group"><label>电话 *</label><input type="text" id="clientPhone" required></div>
            <div class="form-group"><label>等级</label><select id="clientLevel"><option value="C">C类</option><option value="B">B类</option><option value="A">A类</option></select></div>
            <div class="form-group full-width"><button type="submit">➕ 添加客户</button></div>
        </form>
        <h3>客户列表</h3>
        <table><thead><tr><th>等级</th><th>姓名</th><th>电话</th><th>操作</th></tr></thead><tbody id="clientList"></tbody></table>
    </div>
</div>
<div id="toast"></div>

<script>
// 数据
let properties = JSON.parse(localStorage.getItem('properties') || '[]');
let clients = JSON.parse(localStorage.getItem('clients') || '[]');

// 保存
function save() {
    localStorage.setItem('properties', JSON.stringify(properties));
    localStorage.setItem('clients', JSON.stringify(clients));
}

// 提示
function toast(msg) {
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show';
    setTimeout(() => t.className = '', 2000);
}

// 标签
function openTab(evt, tabName) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    evt.currentTarget.classList.add('active');
}

// 渲染
function renderAll() {
    // 房源
    document.getElementById('propertyList').innerHTML = properties.map((p, i) => `
        <tr>
            <td>${p.build}</td>
            <td>${p.room}</td>
            <td>${p.area}</td>
            <td>${p.price}</td>
            <td><button class="danger" onclick="delProperty(${i})">删除</button></td>
        </tr>
    `).join('') || '<tr><td colspan=5 align=center>暂无数据</td></tr>';

    // 客户
    document.getElementById('clientList').innerHTML = clients.map((c, i) => `
        <tr>
            <td><span class="badge badge-${c.level}">${c.level}</span></td>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td><button class="danger" onclick="delClient(${i})">删除</button></td>
        </tr>
    `).join('') || '<tr><td colspan=4 align=center>暂无数据</td></tr>';
}

// 添加房源
function addProperty(e) {
    e.preventDefault();
    let build = document.getElementById('buildName').value;
    let room = document.getElementById('roomNo').value;
    let area = document.getElementById('area').value;
    let price = document.getElementById('price').value;

    properties.push({ build, room, area, price });
    save();
    renderAll();
    e.target.reset();
    toast("房源添加成功 ✅");
}

// 添加客户
function addClient(e) {
    e.preventDefault();
    let name = document.getElementById('clientName').value;
    let phone = document.getElementById('clientPhone').value;
    let level = document.getElementById('clientLevel').value;

    clients.push({ name, phone, level });
    save();
    renderAll();
    e.target.reset();
    toast("客户添加成功 ✅");
}

// 删除
function delProperty(i) {
    if (!confirm('确定删除？')) return;
    properties.splice(i, 1);
    save();
    renderAll();
    toast("删除成功");
}
function delClient(i) {
    if (!confirm('确定删除？')) return;
    clients.splice(i, 1);
    save();
    renderAll();
    toast("删除成功");
}

// 初始化
renderAll();
</script>
</body>
</html>
